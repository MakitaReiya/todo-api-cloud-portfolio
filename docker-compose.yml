version: "3.9"

services:
  app:
    build: .
    container_name: todo_app
    ports:
      - "8000:8000"
    volumes:
      - .:/code
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/todo_db
    depends_on:
      - db

  db:
    image: postgres:16
    container_name: todo_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: todo_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: